<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Waypoint Admin</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 20px; background: #0f172a; color: white; }
        #map { height: 600px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .controls { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        input { background: #334155; border: 1px solid #475569; color: white; padding: 8px; border-radius: 4px; margin-right: 10px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        .status { margin-top: 10px; font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>
    <h1>Drone Waypoint Control</h1>
    
    <div id="map"></div>
    
    <div class="controls">
        <label>Lat: </label><input type="text" id="lat" readonly>
        <label>Lon: </label><input type="text" id="lon" readonly>
        <label>Alt (m): </label><input type="number" id="alt" value="10">
        <button onclick="sendMission()">Send Mission</button>
        <div id="status" class="status">Click on the map to select a waypoint.</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([10.7701, 106.6573], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let marker;

        map.on('click', function(e) {
            const { lat, lng } = e.latlng;
            document.getElementById('lat').value = lat.toFixed(6);
            document.getElementById('lon').value = lng.toFixed(6);
            
            if (marker) {
                marker.setLatLng(e.latlng);
            } else {
                marker = L.marker(e.latlng).addTo(map);
            }
        });

        async function sendMission() {
            const lat = parseFloat(document.getElementById('lat').value);
            const lon = parseFloat(document.getElementById('lon').value);
            const alt = parseFloat(document.getElementById('alt').value);
            const statusDiv = document.getElementById('status');

            if (isNaN(lat) || isNaN(lon)) {
                statusDiv.innerText = "Please select a point on the map first.";
                return;
            }

            statusDiv.innerText = "Sending mission...";

            try {
                const response = await fetch('http://localhost:3000/mission', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat, lon, alt })
                });

                if (response.ok) {
                    statusDiv.innerText = "Mission sent successfully!";
                    statusDiv.style.color = "#4ade80";
                } else {
                    statusDiv.innerText = "Failed to send mission.";
                    statusDiv.style.color = "#f87171";
                }
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Error connecting to backend.";
                statusDiv.style.color = "#f87171";
            }
        }
    </script>
</body>
</html>
